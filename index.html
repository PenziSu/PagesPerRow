<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF N-View</title>
<style>
  :root { --gap: 8px; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #333;
    color: #ddd;
    font: 14px/1.4 -apple-system, "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Toolbar ---------- */
  #toolbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 16px;
    background: #222;
    border-bottom: 1px solid #111;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
  }
  #fileName {
    font-weight: 600;
    max-width: 28ch;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #fff;
  }
  #toolbar label {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  #toolbar input[type="range"] { accent-color: #5a9; }
  #colsVal, #zoomVal {
    display: inline-block;
    min-width: 4ch;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #fitBtn {
    background: #444;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 2px 10px;
    cursor: pointer;
    font: inherit;
  }
  #fitBtn:hover { background: #555; }
  #fitBtn.active { background: #5a9; color: #112; border-color: #5a9; }
  #openBtn {
    flex: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    padding: 0;
    background: #444;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    cursor: pointer;
  }
  #openBtn:hover { background: #5a9; color: #112; border-color: #5a9; }
  #openBtn svg { width: 18px; height: 18px; display: block; }
  #pageCount { margin-left: auto; color: #aaa; }
  #searchGroup { display: flex; align-items: center; gap: 6px; }
  #searchGroup > svg { width: 16px; height: 16px; color: #888; flex: none; }
  #searchInput {
    background: #111;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 8px;
    width: 14ch;
    font: inherit;
  }
  #searchInput:focus { outline: none; border-color: #5a9; }
  #searchStatus { color: #aaa; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .search-nav {
    background: #444;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    width: 26px;
    height: 28px;
    padding: 0;
    cursor: pointer;
    font: inherit;
    line-height: 1;
  }
  .search-nav:hover:not(:disabled) { background: #555; }
  .search-nav:disabled { opacity: .4; cursor: default; }

  /* ---------- Viewer / Grid ---------- */
  #viewer {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  #dropHint[hidden] { display: none; }
  #dropHint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #888;
    font-size: 20px;
    cursor: pointer;
    user-select: none;
    padding: 24px;
  }
  body.dragging #viewer { outline: 3px dashed #5a9; outline-offset: -3px; }
  body.dragging #dropHint { color: #5a9; }

  #grid {
    display: grid;
    gap: var(--gap);
    justify-content: center;
    align-items: start;
    padding: 16px;
    width: max-content;
    min-width: 100%;
  }
  .page { cursor: zoom-in; position: relative; }
  .page.has-match canvas { outline: 2px solid #f5d000; outline-offset: 1px; }
  .page.current-match canvas { outline: 3px solid #ff9500; outline-offset: 1px; }
  .page.has-match::after {
    content: attr(data-match-count);
    position: absolute;
    top: 4px;
    right: 4px;
    background: #f5d000;
    color: #222;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 10px;
    pointer-events: none;
  }
  .page canvas {
    display: block;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0, 0, 0, .5);
  }
  .page .label {
    text-align: center;
    color: #aaa;
    font-size: 12px;
    padding: 4px 0 2px;
    user-select: none;
  }

  /* ---------- Modal ---------- */
  #modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 100;
    cursor: zoom-out;
  }
  #modal[hidden] { display: none; }
  #modalCanvas {
    background: #fff;
    box-shadow: 0 4px 24px rgba(0, 0, 0, .8);
    cursor: default;
    max-width: 94vw;
    max-height: 88vh;
  }
  #modalLabel { color: #ccc; user-select: none; }
</style>
</head>
<body>

<header id="toolbar">
  <button id="openBtn" title="開啟檔案" aria-label="開啟檔案">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1H3V7Z"/>
      <path d="M3 10h17.5a1 1 0 0 1 .97 1.243l-1.5 6A1 1 0 0 1 19 18H5a2 2 0 0 1-2-2v-6Z"/>
    </svg>
  </button>
  <span id="fileName" title="">未載入檔案</span>
  <label>每行
    <input type="range" id="colsSlider" min="1" max="8" value="4">
    <span id="colsVal">4</span> 頁
  </label>
  <label>縮放
    <input type="range" id="zoomSlider" min="10" max="200" value="100">
    <span id="zoomVal">--</span>
  </label>
  <button id="fitBtn" class="active" title="自動符合格寬">Fit</button>
  <div id="searchGroup">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜尋文字" autocomplete="off" spellcheck="false">
    <span id="searchStatus"></span>
    <button id="searchPrev" class="search-nav" title="上一個 (Shift+Enter)" disabled>‹</button>
    <button id="searchNext" class="search-nav" title="下一個 (Enter)" disabled>›</button>
  </div>
  <span id="pageCount"></span>
</header>

<main id="viewer">
  <div id="dropHint">拖曳 PDF 到這裡，或點擊選擇檔案</div>
  <div id="grid" hidden></div>
</main>

<div id="modal" hidden>
  <canvas id="modalCanvas"></canvas>
  <div id="modalLabel"></div>
</div>

<input type="file" id="fileInput" accept="application/pdf,.pdf" hidden>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

const $ = id => document.getElementById(id);
const fileName = $('fileName'), pageCount = $('pageCount'),
      colsSlider = $('colsSlider'), colsVal = $('colsVal'),
      zoomSlider = $('zoomSlider'), zoomVal = $('zoomVal'), fitBtn = $('fitBtn'),
      viewer = $('viewer'), dropHint = $('dropHint'), grid = $('grid'), openBtn = $('openBtn'),
      modal = $('modal'), modalCanvas = $('modalCanvas'), modalLabel = $('modalLabel'),
      fileInput = $('fileInput'),
      searchInput = $('searchInput'), searchStatus = $('searchStatus'),
      searchPrev = $('searchPrev'), searchNext = $('searchNext');

const GAP = 8, GRID_PAD = 16;
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

let pdfDoc = null;
let baseWidth = 0;            // 第 1 頁在 scale=1 時的寬度，作為 fit 計算基準
let cols = 4;
let zoom = 100;               // 百分比
let fitMode = true;           // 預設 fit-to-grid
let renderGen = 0;            // 世代記號：換檔 / 換縮放時讓舊的 render 迴圈自行停止
let activeTasks = new Set();  // 進行中的 pdf.js render task，可取消
let modalPage = 0;
let modalSeq = 0;              // 每次請求遞增；過時的請求會自行跳過
let modalChain = Promise.resolve();   // 串行化 modal render，同一時間只跑一個

// ---------- 檔案載入 ----------
async function loadFile(file) {
  if (!file) return;
  if (file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)) {
    alert('請選擇 PDF 檔案');
    return;
  }
  dropHint.textContent = '載入中…';
  try {
    const data = await file.arrayBuffer();
    const doc = await pdfjsLib.getDocument({ data }).promise;
    if (pdfDoc) pdfDoc.destroy();
    pdfDoc = doc;
    resetSearch();
    fileName.textContent = file.name;
    fileName.title = file.name;
    pageCount.textContent = `共 ${doc.numPages} 頁`;
    const page1 = await doc.getPage(1);
    baseWidth = page1.getViewport({ scale: 1 }).width;
    buildGrid();
    dropHint.hidden = true;
    grid.hidden = false;
    fitMode = true;
    applyFit();
    renderAll();
  } catch (err) {
    dropHint.textContent = `載入失敗：${err.message}（拖曳或點擊重試）`;
    console.error(err);
  }
}

function buildGrid() {
  grid.replaceChildren();
  grid.style.gridTemplateColumns = `repeat(${cols}, max-content)`;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const cell = document.createElement('div');
    cell.className = 'page';
    const canvas = document.createElement('canvas');
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = i;
    cell.append(canvas, label);
    cell.addEventListener('click', () => openModal(i));
    grid.appendChild(cell);
  }
}

// ---------- Render ----------
// 取消進行中的 render，並「等它們真正結束」才回傳——
// pdf.js 的 cancel() 不是同步釋放 canvas，沒等就馬上重畫同一張會報
// "Cannot use the same canvas during multiple render() operations"。
async function cancelActive() {
  const tasks = [...activeTasks];
  activeTasks.clear();
  for (const t of tasks) t.cancel();
  await Promise.allSettled(tasks.map(t => t.promise.catch(() => {})));
}

async function renderAll() {
  if (!pdfDoc) return;
  const gen = ++renderGen;
  await cancelActive();
  if (gen !== renderGen) return;          // 期間又有新的 renderAll，讓它接手
  const scale = zoom / 100;
  const dpr = window.devicePixelRatio || 1;
  const cells = grid.children;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (gen !== renderGen) return;
    const canvas = cells[i - 1].firstChild;
    try {
      const page = await pdfDoc.getPage(i);
      if (gen !== renderGen) return;
      const vp = page.getViewport({ scale: scale * dpr });
      canvas.width = vp.width;
      canvas.height = vp.height;
      canvas.style.width = `${vp.width / dpr}px`;
      canvas.style.height = `${vp.height / dpr}px`;
      const task = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
      activeTasks.add(task);
      await task.promise.finally(() => activeTasks.delete(task));
      if (searchQuery) {
        const tc = await getText(i);
        if (gen === renderGen) drawHighlights(canvas.getContext('2d'), tc, vp);
      }
    } catch (err) {
      if (err?.name !== 'RenderingCancelledException') console.error(`page ${i}:`, err);
    }
  }
}

const debounce = (fn, ms) => {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
};
const renderAllDebounced = debounce(renderAll, 150);

// ---------- Fit-to-grid ----------
function fitZoom() {
  const cellWidth = (viewer.clientWidth - GRID_PAD * 2 - GAP * (cols - 1)) / cols;
  return clamp(Math.round(cellWidth / baseWidth * 100), 10, 200);
}

function applyFit() {
  if (!pdfDoc || !fitMode) return;
  zoom = fitZoom();
  zoomSlider.value = zoom;
  zoomVal.textContent = `${zoom}%`;
  fitBtn.classList.add('active');
}

// ---------- Toolbar 事件 ----------
colsSlider.addEventListener('input', () => {
  cols = +colsSlider.value;
  colsVal.textContent = cols;
  grid.style.gridTemplateColumns = `repeat(${cols}, max-content)`;
  if (fitMode) {
    applyFit();
    renderAllDebounced();
  }
});

zoomSlider.addEventListener('input', () => {
  zoom = +zoomSlider.value;
  zoomVal.textContent = `${zoom}%`;
  fitMode = false;
  fitBtn.classList.remove('active');
  renderAllDebounced();
});

fitBtn.addEventListener('click', () => {
  fitMode = true;
  applyFit();
  renderAllDebounced();
});

window.addEventListener('resize', debounce(() => {
  if (fitMode && pdfDoc) {
    const prev = zoom;
    applyFit();
    if (zoom !== prev) renderAll();
  }
}, 200));

// ---------- 檔案選取：點擊與拖曳 ----------
dropHint.addEventListener('click', () => fileInput.click());
openBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  loadFile(fileInput.files[0]);
  fileInput.value = '';
});

let dragDepth = 0;
window.addEventListener('dragenter', e => {
  e.preventDefault();
  dragDepth++;
  document.body.classList.add('dragging');
});
window.addEventListener('dragleave', () => {
  if (--dragDepth <= 0) {
    dragDepth = 0;
    document.body.classList.remove('dragging');
  }
});
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove('dragging');
  loadFile(e.dataTransfer.files[0]);
});

// ---------- 文字搜尋 ----------
let searchQuery = '';            // 已轉小寫，空字串代表未搜尋
let searchGen = 0;              // 取消過期的掃描
const textCache = new Map();     // pageNum -> getTextContent()
let matchPages = [];            // 有命中的頁碼（遞增）
const matchCounts = new Map();   // pageNum -> 命中次數
let matchTotal = 0;
let matchNavIdx = 0;

async function getText(n) {
  if (textCache.has(n)) return textCache.get(n);
  const page = await pdfDoc.getPage(n);
  const tc = await page.getTextContent();
  textCache.set(n, tc);
  return tc;
}

function occurrences(str) {
  if (!searchQuery) return 0;
  const lower = (str || '').toLowerCase();
  let c = 0, from = 0, idx;
  while ((idx = lower.indexOf(searchQuery, from)) !== -1) { c++; from = idx + searchQuery.length; }
  return c;
}

// 算出某個 text item 內每次命中的高亮矩形（canvas 裝置像素座標）
function highlightRects(item, vp) {
  const s = item.str;
  if (!s || !searchQuery) return [];
  const lower = s.toLowerCase();
  const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
  const adv = Math.hypot(tx[0], tx[1]) || 1;
  const ux = tx[0] / adv, uy = tx[1] / adv;          // 文字前進方向單位向量
  const fontH = Math.hypot(tx[2], tx[3]) || (item.height * vp.scale);
  const totalW = item.width * vp.scale;
  const perChar = s.length ? totalW / s.length : 0;  // 字寬近似（非等寬會略有誤差）
  const rects = [];
  let from = 0, idx;
  while ((idx = lower.indexOf(searchQuery, from)) !== -1) {
    const off = idx * perChar;
    const w = searchQuery.length * perChar;
    const bx = tx[4] + ux * off;
    const by = tx[5] + uy * off;
    rects.push({ x: bx, y: by - fontH, w, h: fontH * 1.18 });  // 由基線往上一個字高
    from = idx + searchQuery.length;
  }
  return rects;
}

function drawHighlights(ctx, tc, vp) {
  ctx.save();
  ctx.fillStyle = 'rgba(255, 210, 0, 0.42)';
  for (const item of tc.items)
    for (const r of highlightRects(item, vp))
      ctx.fillRect(r.x, r.y, r.w, r.h);
  ctx.restore();
}

function paintMatchIndicators() {
  if (!pdfDoc) return;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const cell = grid.children[i - 1];
    if (matchCounts.has(i)) {
      cell.classList.add('has-match');
      cell.setAttribute('data-match-count', matchCounts.get(i));
    } else {
      cell.classList.remove('has-match', 'current-match');
      cell.removeAttribute('data-match-count');
    }
  }
}

function renderSearchStatus() {
  searchPrev.disabled = searchNext.disabled = !matchPages.length;
  if (!searchQuery) { searchStatus.textContent = ''; return; }
  if (!matchPages.length) { searchStatus.textContent = '無結果'; return; }
  searchStatus.textContent =
    `${matchTotal} 筆 · 頁 ${matchPages[matchNavIdx]} (${matchNavIdx + 1}/${matchPages.length})`;
}

function scrollToMatch() {
  const p = matchPages[matchNavIdx];
  if (!p) return;
  for (const c of grid.querySelectorAll('.page.current-match')) c.classList.remove('current-match');
  const cell = grid.children[p - 1];
  cell.classList.add('current-match');
  cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function navMatch(dir) {
  if (!matchPages.length) return;
  matchNavIdx = (matchNavIdx + dir + matchPages.length) % matchPages.length;
  scrollToMatch();
  renderSearchStatus();
}

function resetSearch() {
  searchInput.value = '';
  searchQuery = '';
  searchGen++;
  textCache.clear();
  matchPages = [];
  matchCounts.clear();
  matchTotal = 0;
  matchNavIdx = 0;
  renderSearchStatus();
}

async function runSearch() {
  const q = searchInput.value.trim().toLowerCase();
  searchQuery = q;
  const gen = ++searchGen;
  matchPages = [];
  matchCounts.clear();
  matchTotal = 0;
  matchNavIdx = 0;
  if (!pdfDoc) { renderSearchStatus(); return; }
  if (!q) {
    paintMatchIndicators();
    renderSearchStatus();
    renderAll();
    if (!modal.hidden) renderModal();
    return;
  }
  searchStatus.textContent = '搜尋中…';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const tc = await getText(i);
    if (gen !== searchGen) return;                 // 查詢已變更，放棄這次掃描
    let c = 0;
    for (const item of tc.items) c += occurrences(item.str);
    if (c > 0) { matchPages.push(i); matchCounts.set(i, c); matchTotal += c; }
  }
  paintMatchIndicators();
  renderSearchStatus();
  renderAll();                                     // 重畫並疊上高亮
  if (!modal.hidden) renderModal();
  if (matchPages.length) scrollToMatch();
}
const runSearchDebounced = debounce(runSearch, 250);

searchInput.addEventListener('input', runSearchDebounced);
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (searchInput.value.trim().toLowerCase() !== searchQuery) runSearch();
    else navMatch(e.shiftKey ? -1 : 1);
  } else if (e.key === 'Escape') {
    e.stopPropagation();
    searchInput.value = '';
    runSearch();
    searchInput.blur();
  }
});
searchPrev.addEventListener('click', () => navMatch(-1));
searchNext.addEventListener('click', () => navMatch(1));
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'f' || e.key === 'F')) {
    if (!pdfDoc) return;
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});

// ---------- Modal 單頁放大 ----------
async function openModal(n) {
  modalPage = n;
  modal.hidden = false;
  renderModal();
}

// 串行化：把每次 render 接到 chain 後面，保證 modalCanvas 同時只有一個 render。
function renderModal() {
  const seq = ++modalSeq;
  modalChain = modalChain.then(() => renderModalInner(seq));
}

async function renderModalInner(seq) {
  if (seq !== modalSeq || modal.hidden) return;   // 已被更新的請求取代，跳過這個中間態
  const n = modalPage;
  modalLabel.textContent = `${n} / ${pdfDoc.numPages}`;
  try {
    const page = await pdfDoc.getPage(n);
    if (seq !== modalSeq || modal.hidden) return;
    const base = page.getViewport({ scale: 1 });
    const fit = Math.min(
      window.innerWidth * 0.94 / base.width,
      window.innerHeight * 0.88 / base.height
    );
    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: fit * dpr });
    modalCanvas.width = vp.width;
    modalCanvas.height = vp.height;
    modalCanvas.style.width = `${vp.width / dpr}px`;
    modalCanvas.style.height = `${vp.height / dpr}px`;
    await page.render({ canvasContext: modalCanvas.getContext('2d'), viewport: vp }).promise;
    if (searchQuery) {
      const tc = await getText(n);
      if (seq === modalSeq && !modal.hidden) drawHighlights(modalCanvas.getContext('2d'), tc, vp);
    }
  } catch (err) {
    if (err?.name !== 'RenderingCancelledException') console.error(err);
  }
}

function closeModal() {
  modal.hidden = true;
  modalSeq++;            // 讓佇列中過時的 render 自行跳過
}

modal.addEventListener('click', e => {
  if (e.target !== modalCanvas) closeModal();
});

window.addEventListener('keydown', e => {
  if (modal.hidden || e.target === searchInput) return;
  if (e.key === 'Escape') closeModal();
  else if (e.key === 'ArrowLeft' && modalPage > 1) { modalPage--; renderModal(); }
  else if (e.key === 'ArrowRight' && modalPage < pdfDoc.numPages) { modalPage++; renderModal(); }
});
</script>
</body>
</html>
